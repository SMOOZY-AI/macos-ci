name: Release macOS

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
        default: patch
        required: true

permissions:
  contents: write

jobs:
  release-macos:
    name: "Release macOS (${{ inputs.bump }})"
    runs-on: macos-14
    timeout-minutes: 60
    env:
      GITLAB_DEPLOY_TOKEN_USERNAME: ${{ secrets.GITLAB_DEPLOY_TOKEN_USERNAME }}
      GITLAB_DEPLOY_TOKEN_PASSWORD: ${{ secrets.GITLAB_DEPLOY_TOKEN_PASSWORD }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      UPDATE_SECRET: ${{ secrets.UPDATE_SECRET }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
      APPLE_API_KEY_PATH: /tmp/AuthKey.p8
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Configure GitLab SSH key
        shell: bash
        run: |
          if [ -z "${{ secrets.GITLAB_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::GITLAB_SSH_PRIVATE_KEY secret is missing — cannot clone source"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/smoozy_gitlab
          ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/smoozy_gitlab
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat <<'EOF' > ~/.ssh/config
          Host gitlab.com
            HostName gitlab.com
            User git
            IdentityFile ~/.ssh/smoozy_gitlab
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone source from GitLab
        shell: bash
        run: |
          git clone git@gitlab.com:smoozy-app/smoozy-macos.git source

          cd source
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Cloned $(git rev-parse --short HEAD) from GitLab"

      - name: Resolve Apple notarization auth
        id: auth_resolve
        shell: bash
        run: |
          set -euo pipefail

          has_api_auth=false
          has_apple_id_auth=false

          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -n "${APPLE_API_KEY_CONTENT:-}" ]; then
            has_api_auth=true
          fi

          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            has_apple_id_auth=true
          fi

          if [ "$has_api_auth" = true ]; then
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
            chmod 600 "$APPLE_API_KEY_PATH"
            echo "method=api-key" >> "$GITHUB_OUTPUT"
            echo "Resolved notarization auth: App Store Connect API key"
          elif [ "$has_apple_id_auth" = true ]; then
            rm -f "$APPLE_API_KEY_PATH"
            echo "method=apple-id" >> "$GITHUB_OUTPUT"
            echo "Resolved notarization auth: Apple ID"
          else
            echo "::error::Missing Apple notarization credentials. Provide either APPLE_API_KEY_ID + APPLE_API_ISSUER + APPLE_API_KEY_CONTENT or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID."
            exit 1
          fi

      - name: Import Apple certificate
        shell: bash
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install Rust (clean install via rustup-init)
        # Earlier iterations used dtolnay/rust-toolchain@stable + PATH-prepend,
        # then layered a sudo-rm of the Apple CommandLineTools cargo shim on
        # top. Both kept failing: even with the Apple shim gone and
        # `which cargo` printing /Users/runner/.cargo/bin/cargo from inside
        # the build step, `tauri build` still invoked `cargo metadata` and
        # got rustup-init's help banner back.
        #
        # The remaining culprit is the binary AT $HOME/.cargo/bin/cargo
        # itself: dtolnay's install on macos-14 has been leaving partial
        # / unconfigured rustup state behind (a rustup-init blob renamed
        # cargo, not the rustup multi-call proxy). The only reliable fix is
        # to wipe ~/.cargo and ~/.rustup, then run rustup-init.sh ourselves
        # and verify the resulting binary with `file` and `cargo --version`
        # BEFORE letting the rest of the workflow touch it.
        shell: bash
        run: |
          set -euo pipefail

          # Wipe any partial rustup state from the runner image so we install
          # into a known-clean tree.
          rm -rf "$HOME/.cargo" "$HOME/.rustup"

          # Remove Apple CommandLineTools rustup-init shims as well — even
          # though they're no longer hijacking us (PATH-wise), having them
          # around invites future regressions.
          for f in cargo rustc rustdoc rustup; do
            sudo rm -f "/Library/Developer/CommandLineTools/usr/bin/$f"
          done

          # Install rustup + stable + the aarch64-apple-darwin target. The
          # --no-modify-path flag stops rustup-init from touching shell rc
          # files (we manage PATH via GITHUB_PATH below). --profile minimal
          # skips rust-docs to shave a few hundred MB and seconds.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --no-modify-path --default-toolchain stable \
                        --target aarch64-apple-darwin --profile minimal

          # Sanity-prove the cargo we are about to put on PATH is the real
          # rustup proxy, not another rustup-init blob. If `file` reveals
          # anything other than a Mach-O executable, or `cargo --version`
          # exits non-zero, fail fast here instead of 10 minutes into the
          # build at `cargo metadata`.
          echo "── cargo binary type ──"
          file "$HOME/.cargo/bin/cargo"
          echo "── cargo version ──"
          "$HOME/.cargo/bin/cargo" --version
          "$HOME/.cargo/bin/rustc" --version

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri
          cache-on-failure: true

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: source/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build and release
        working-directory: source
        shell: bash
        run: |
          set -e

          # Belt + suspenders against macos-14 PATH ordering AND tauri-cli's
          # cargo lookup. `cargo_metadata` (used internally by tauri-cli)
          # honours $CARGO if set — making this absolute path bulletproof
          # against PATH being clobbered by any intermediate setup-action.
          export CARGO="$HOME/.cargo/bin/cargo"
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "cargo resolved at: $(which cargo) (CARGO=$CARGO)"

          # Hard-unset the opposite credential set so Tauri-bundler can't probe
          # it. Setting to empty string via env: isn't enough — Tauri 2.x treats
          # APPLE_ID="" as "Apple ID auth is configured" because the var exists
          # in the process environment, then sends empty creds to notarytool
          # and Apple returns 401 "Invalid credentials".
          # `unset` removes the var from the bash environment so the spawned
          # `pnpm tauri:build` process inherits an environment where the var
          # genuinely doesn't exist.
          if [ "${{ steps.auth_resolve.outputs.method }}" = "api-key" ]; then
            unset APPLE_ID APPLE_PASSWORD
            echo "Build env: API-key path (APPLE_ID/PASSWORD unset)"
          elif [ "${{ steps.auth_resolve.outputs.method }}" = "apple-id" ]; then
            unset APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_PATH
            echo "Build env: Apple-ID path (APPLE_API_* unset)"
          fi

          BUMP_FLAG=""
          if [ "${{ inputs.bump }}" = "patch" ]; then
            BUMP_FLAG="--patch"
          fi
          node scripts/bump-release.mjs $BUMP_FLAG --no-password

      - name: Commit and push version bump to GitLab
        if: success()
        working-directory: source
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git commit -m "chore: release $VERSION"

          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing on origin/main"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Unexpected rebase conflict on version bump — aborting"
              exit 1
            fi
          done

          echo "::error::Failed to push version bump after 5 attempts"
          exit 1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoozy-macos-${{ inputs.bump }}
          path: |
            source/src-tauri/target/release/bundle/macos/*.dmg
            source/src-tauri/target/release/bundle/macos/*.app.tar.gz
            source/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 14
          if-no-files-found: warn
