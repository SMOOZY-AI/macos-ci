name: CI (manual sanity check)

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Also run inherited Vitest suite"
        type: boolean
        default: false
        required: false

jobs:
  sanity:
    name: Typecheck + Build (+ optional tests)
    runs-on: macos-14
    timeout-minutes: 35

    steps:
      - name: Configure GitLab SSH key
        shell: bash
        run: |
          if [ -z "${{ secrets.GITLAB_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::GITLAB_SSH_PRIVATE_KEY secret is missing"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/smoozy_gitlab
          ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/smoozy_gitlab
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat <<'EOF' > ~/.ssh/config
          Host gitlab.com
            HostName gitlab.com
            User git
            IdentityFile ~/.ssh/smoozy_gitlab
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone source from GitLab
        shell: bash
        run: |
          git clone --depth 1 git@gitlab.com:smoozy-ai/mac.git source

      - name: Install Rust (clean install via rustup-init)
        # See release.yml for the full rationale. tl;dr: dtolnay's install
        # on macos-14 has been leaving partial rustup state behind so the
        # `cargo` proxy at ~/.cargo/bin/ is actually rustup-init in
        # installer mode. We wipe state and install fresh, then verify
        # before letting the cache / build steps run.
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$HOME/.cargo" "$HOME/.rustup"
          for f in cargo rustc rustdoc rustup; do
            sudo rm -f "/Library/Developer/CommandLineTools/usr/bin/$f"
          done
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --no-modify-path --default-toolchain stable \
                        --target aarch64-apple-darwin --profile minimal
          echo "── cargo binary type ──"
          file "$HOME/.cargo/bin/cargo"
          "$HOME/.cargo/bin/cargo" --version
          "$HOME/.cargo/bin/rustc" --version
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri
          cache-on-failure: true

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: source/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: source
        run: pnpm typecheck

      - name: Frontend build
        working-directory: source
        run: pnpm build

      - name: Cargo check
        working-directory: source/src-tauri
        shell: bash
        run: |
          export CARGO="$HOME/.cargo/bin/cargo"
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check

      - name: Test
        if: ${{ inputs.run_tests }}
        working-directory: source
        run: pnpm test
