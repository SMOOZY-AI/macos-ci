name: CI (manual sanity check)

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Also run inherited Vitest suite"
        type: boolean
        default: false
        required: false

jobs:
  sanity:
    name: Typecheck + Build (+ optional tests)
    runs-on: macos-14
    timeout-minutes: 35

    steps:
      - name: Configure GitLab SSH key
        shell: bash
        run: |
          if [ -z "${{ secrets.GITLAB_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::GITLAB_SSH_PRIVATE_KEY secret is missing"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/smoozy_gitlab
          ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/smoozy_gitlab
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat <<'EOF' > ~/.ssh/config
          Host gitlab.com
            HostName gitlab.com
            User git
            IdentityFile ~/.ssh/smoozy_gitlab
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone source from GitLab
        shell: bash
        run: |
          git clone --depth 1 git@gitlab.com:smoozy-app/smoozy-macos.git source

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Pin cargo from rustup toolchain
        # macos-14 ships a rustup-init stub at
        # /Library/Developer/CommandLineTools/usr/bin/cargo that hijacks `cargo`
        # calls when PATH ordering puts CommandLineTools ahead of ~/.cargo/bin.
        # tauri-cli and `cargo check` both spawn `cargo metadata`, which then
        # errors with "unexpected argument 'metadata'". Nuke the shim files so
        # nothing can collide with the real toolchain regardless of PATH order.
        shell: bash
        run: |
          set -e
          for f in cargo rustc rustdoc rustup; do
            sudo rm -f "/Library/Developer/CommandLineTools/usr/bin/$f"
          done
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "which cargo: $(which cargo)"
          cargo --version

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri
          cache-on-failure: true

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: source/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: source
        run: pnpm typecheck

      - name: Frontend build
        working-directory: source
        run: pnpm build

      - name: Cargo check
        working-directory: source/src-tauri
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check

      - name: Test
        if: ${{ inputs.run_tests }}
        working-directory: source
        run: pnpm test
