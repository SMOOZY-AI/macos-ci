name: Secrets Smoke Check

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Validate release secrets
    runs-on: macos-14
    timeout-minutes: 15
    env:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      GITLAB_DEPLOY_TOKEN_USERNAME: ${{ secrets.GITLAB_DEPLOY_TOKEN_USERNAME }}
      GITLAB_DEPLOY_TOKEN_PASSWORD: ${{ secrets.GITLAB_DEPLOY_TOKEN_PASSWORD }}
      GITLAB_SSH_PRIVATE_KEY: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
      UPDATE_SECRET: ${{ secrets.UPDATE_SECRET }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check required secrets are present
        shell: bash
        run: |
          set -euo pipefail

          required=(
            GITLAB_DEPLOY_TOKEN_USERNAME
            GITLAB_DEPLOY_TOKEN_PASSWORD
            GITLAB_SSH_PRIVATE_KEY
            UPDATE_SECRET
            TAURI_SIGNING_PRIVATE_KEY
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
            APPLE_CERTIFICATE_BASE64
            APPLE_CERTIFICATE_PASSWORD
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          has_api_auth=false
          has_apple_id_auth=false

          if [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -n "${APPLE_API_KEY_CONTENT:-}" ]; then
            has_api_auth=true
          fi

          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            has_apple_id_auth=true
          fi

          if [ "$has_api_auth" = false ] && [ "$has_apple_id_auth" = false ]; then
            echo "::error::Missing Apple notarization credentials. Provide either APPLE_API_KEY_ID + APPLE_API_ISSUER + APPLE_API_KEY_CONTENT or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID."
            exit 1
          fi

          if [ "$has_api_auth" = true ]; then
            echo "Resolved notarization auth for smoke check: App Store Connect API key"
          else
            echo "Resolved notarization auth for smoke check: Apple ID"
          fi

          echo "All required base secrets are visible to this repo"

      - name: Validate GitLab API token (optional)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GITLAB_TOKEN:-}" ]; then
            echo "GitLab API token is not set; release will still work via SSH + deploy token, but GitLab Release creation will be skipped"
            exit 0
          fi

          # TODO: replace project path with numeric project ID once known.
          # Use URL-encoded path (`%2F`) lookup which works without ID.
          status=$(curl -sS -o /tmp/gitlab_project.json -w "%{http_code}" \
            --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            "https://gitlab.com/api/v4/projects/smoozy-ai%2Fmac")

          if [ "$status" != "200" ]; then
            echo "::warning::GITLAB_TOKEN could not access project smoozy-ai/mac (status=$status)"
            cat /tmp/gitlab_project.json
            echo "Continuing because the release pipeline does not require GitLab API access for the critical path"
            exit 0
          fi

          echo "GitLab API token can access smoozy-ai/mac"

      - name: Validate GitLab SSH clone
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/smoozy_gitlab
          ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/smoozy_gitlab
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/smoozy_gitlab -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          git ls-remote git@gitlab.com:smoozy-ai/mac.git -h refs/heads/main >/tmp/gitlab_ls_remote.txt

          test -s /tmp/gitlab_ls_remote.txt
          echo "GitLab SSH key can read smoozy-ai/mac"

      - name: Validate Apple certificate import
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/secrets-smoke.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/apple-cert.p12"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 900 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee /tmp/apple-identities.txt
          if ! grep -q "Developer ID Application" /tmp/apple-identities.txt; then
            echo "::error::Imported certificate does not expose a Developer ID Application identity"
            exit 1
          fi

          echo "Apple certificate/password pair is valid"

      - name: Validate Apple notarization credentials with notarytool
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/notary-smoke.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          PROFILE_NAME="smoozy-secrets-smoke"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 900 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -n "${APPLE_API_KEY_CONTENT:-}" ]; then
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"

            xcrun notarytool store-credentials "$PROFILE_NAME" \
              --key "$API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --keychain "$KEYCHAIN_PATH" \
              --validate

            echo "Apple API key/id/issuer combination validated via notarytool"
          else
            xcrun notarytool store-credentials "$PROFILE_NAME" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --keychain "$KEYCHAIN_PATH" \
              --validate

            echo "Apple ID/app-specific password/team ID combination validated via notarytool"
          fi

      - name: Validate release helper secrets are non-empty
        shell: bash
        run: |
          set -euo pipefail

          for name in GITLAB_DEPLOY_TOKEN_USERNAME GITLAB_DEPLOY_TOKEN_PASSWORD UPDATE_SECRET TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is empty"
              exit 1
            fi
          done

          echo "Release helper secrets are populated"
